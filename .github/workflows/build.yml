name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: false
        type: string
      publish:
        description: "Set r for release, p for prerelease, leave empty to skip publishing"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            os: windows
            qt_version: "6.11.0"
            qt_arch: x64
            archive_name: proxy-converter-windows-x64.7z
          - name: linux-x64-portable
            runner: ubuntu-24.04
            os: linux
            qt_version: "6.11.0"
            qt_arch: linux_gcc_64
            archive_name: proxy-converter-linux-x64.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt (Linux)
        if: matrix.os == 'linux'
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          setup-python: true
          cache: true
          cache-key-prefix: proxy-converter-${{ matrix.name }}

      - name: Download static Qt (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          curl -L -o qt.7z "https://github.com/throneproj/buildqt/releases/download/Qt_${{ matrix.qt_version }}/Qt_${{ matrix.qt_version }}_${{ matrix.qt_arch }}.7z"
          7z x qt.7z -oQt

      - name: Configure
        shell: bash
        run: |
          mkdir -p build

          if [ "${{ matrix.os }}" = "windows" ]; then
            export CMAKE_PREFIX_PATH="$PWD/Qt/lib/cmake"
            cmake -S . -B build -G Ninja \
              -DPROXY_CONVERTER_HEADLESS=ON \
              -DPROXY_CONVERTER_SINGLE_BINARY=ON \
              -DPROXY_CONVERTER_STATIC_MSVC_RUNTIME=ON \
              -DPROXY_CONVERTER_BUNDLE_QT_RUNTIME=OFF \
              -DCMAKE_BUILD_TYPE=Release
          else
            cmake -S . -B build -G Ninja \
              -DPROXY_CONVERTER_HEADLESS=ON \
              -DPROXY_CONVERTER_SINGLE_BINARY=OFF \
              -DPROXY_CONVERTER_BUNDLE_QT_RUNTIME=ON \
              -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        shell: bash
        run: cmake --build build --parallel

      - name: Install
        shell: bash
        run: |
          cmake --install build --prefix "${{ github.workspace }}/deployment/${{ matrix.name }}"

      - name: Package Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ github.workspace }}\deployment\${{ matrix.name }}\*" `
            -DestinationPath "${{ github.workspace }}\${{ matrix.archive_name }}" `
            -Force

      - name: Package Linux
        if: matrix.os == 'linux'
        shell: bash
        run: |
          cd "${{ github.workspace }}/deployment/${{ matrix.name }}"
          zip -r "${{ github.workspace }}/${{ matrix.archive_name }}" .

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ github.workspace }}/${{ matrix.archive_name }}